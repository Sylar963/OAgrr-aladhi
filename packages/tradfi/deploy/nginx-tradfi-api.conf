# Reverse proxy for the TradFi backend: tradfi-api.oggregator.xyz -> 127.0.0.1:3200
# Mirrors the existing api.oggregator.xyz setup. Install on the HOST.
#
#   sudo cp packages/tradfi/deploy/nginx-tradfi-api.conf /etc/nginx/sites-available/tradfi-api.oggregator.xyz
#   sudo ln -s /etc/nginx/sites-available/tradfi-api.oggregator.xyz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d tradfi-api.oggregator.xyz   # adds the TLS (443) server block
#
# Requires this in the http{} block (once per server, usually already present for /ws):
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    listen [::]:80;
    server_name tradfi-api.oggregator.xyz;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for GET /ws/chain
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
